<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · Sistema de Despacho de Coletas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
  body{min-height:100vh;display:grid;place-items:center;background:#f2f4f7;color:#16212e;padding:20px;}
  .box{width:100%;max-width:380px;background:#fff;border:1px solid #e1e6eb;border-radius:14px;padding:30px 26px;}
  .tag{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#8694a3;margin-bottom:6px;}
  h1{font-size:21px;font-weight:700;letter-spacing:-.2px;margin-bottom:4px;}
  .sub{color:#5b6b7c;font-size:13px;margin-bottom:24px;}
  label{display:block;font-size:11.5px;color:#5b6b7c;font-weight:600;margin-bottom:6px;}
  input{width:100%;background:#f7f9fb;border:1px solid #e1e6eb;color:#16212e;border-radius:8px;
    padding:11px 13px;font-size:14px;margin-bottom:14px;}
  button{width:100%;border:none;background:#16803a;color:#fff;font-weight:600;font-size:14.5px;
    padding:12px;border-radius:8px;cursor:pointer;}
  button:hover{background:#0f5d2a;}
  .erro{background:#fdeceb;color:#a93226;font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:14px;}
</style>
</head>
<body>
  <div class="box">
    <div class="tag">Sistema de Despacho de Coletas</div>
    <h1>Entrar</h1>
    <div class="sub">Unimed &harr; Santa Casa</div>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    <form method="post">
      <label>Usuário</label>
      <input name="username" autocomplete="off" required>
      <label>Senha</label>
      <input name="senha" type="password" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
