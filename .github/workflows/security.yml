name: Qualidade e segurança

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: despacho_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d despacho_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_SECRET: segredo-exclusivo-para-testes-automatizados-no-ci
      DESPACHO_ADMIN_SENHA_INICIAL: senha-admin-exclusiva-para-testes-ci
      DESPACHO_DB_PATH: /tmp/despacho-ci.db

    steps:
      - name: Obter código
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Executar testes
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Testar PostgreSQL e Redis reais
        env:
          TEST_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/despacho_test?sslmode=disable
          TEST_REDIS_URL: redis://127.0.0.1:6379/0
        run: python -m unittest tests.test_integration_services

      - name: Validar configuração de nuvem
        run: python scripts/gcp_preflight.py

      - name: Auditar dependências conhecidas
        run: python -m pip_audit -r requirements.txt

      - name: Analisar segurança do código Python
        run: python -m bandit -r corridas scripts migrations -x tests -ll -ii
