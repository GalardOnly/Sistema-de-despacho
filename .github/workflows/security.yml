name: Qualidade e segurança

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: testing
      APP_SECRET: segredo-exclusivo-para-testes-automatizados-no-ci
      DESPACHO_ADMIN_SENHA_INICIAL: senha-admin-exclusiva-para-testes-ci
      DESPACHO_DB_PATH: /tmp/despacho-ci.db

    steps:
      - name: Obter código
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Executar testes
        run: python -m unittest discover -s corridas/tests -p "test_*.py"

      - name: Validar configuração de nuvem
        run: python scripts/gcp_preflight.py

      - name: Auditar dependências conhecidas
        run: python -m pip_audit -r requirements.txt

      - name: Analisar segurança do código Python
        run: python -m bandit -r corridas scripts -x corridas/tests -ll -ii
