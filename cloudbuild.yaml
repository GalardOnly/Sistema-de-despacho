steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=sistema-despacho-run@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=APP_ENV=homologation,ALLOW_EPHEMERAL_SQLITE=1,TRUST_PROXY_HEADERS=1,DESPACHO_DB_PATH=/tmp/despacho.db,GUNICORN_WORKERS=1
      - --set-secrets=APP_SECRET=despacho-app-secret:latest,DESPACHO_ADMIN_SENHA_INICIAL=despacho-admin-senha-inicial:latest
      - --min=1
      - --max=1
      - --concurrency=20
      - --cpu=1
      - --memory=512Mi
      - --timeout=60

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID

substitutions:
  _REGION: southamerica-east1
  _REPOSITORY: sistema-despacho
  _SERVICE: sistema-despacho-hml

options:
  logging: CLOUD_LOGGING_ONLY
